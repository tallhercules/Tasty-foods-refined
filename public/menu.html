<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu | Tasty Foods</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .menu-hero {
      background: var(--dark);
      padding: 120px 24px 60px;
      text-align: center;
    }
    .menu-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      color: white;
      margin: 12px 0;
    }
    .menu-hero p { color: rgba(255,255,255,0.55); font-size: 1rem; }

    .filter-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 32px 24px 0;
      max-width: 1200px;
      margin: 0 auto;
    }

    .filter-btn {
      padding: 9px 22px;
      border-radius: 99px;
      border: 2px solid var(--border);
      background: white;
      color: var(--mid);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }

    .menu-grid-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    .pag-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }
    .pag-btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: var(--dark);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }
    .pag-btn:hover:not(:disabled) { background: var(--brand); }
    .pag-btn:disabled { background: var(--border); color: var(--mid); cursor: not-allowed; }
    .pag-info { font-weight: 700; color: var(--dark); }
  </style>
</head>
<body>

<!-- ─── NAVBAR ─────────────────────────────────────────────────────────────── -->
<nav class="navbar">
  <div class="nav-content">

    <!-- Hamburger — left -->
    <button class="hamburger" id="hamburger" onclick="toggleMobileMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Logo — center -->
    <a href="index.html" class="brand">
      <img src="images/logo.png" alt="Tasty Foods Logo">
      <span class="brand-name">TASTY FOODS</span>
    </a>
<ul class="nav-links" id="nav-links">

  <!-- Logo inside mobile menu -->
  <li class="mobile-menu-logo" style="margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid var(--border);">
    <div style="display:flex; align-items:center; gap:10px; padding:0 16px;">
      <img src="images/logo.png" style="width:38px; height:38px; object-fit:contain;">
      <span style="font-family:'Raleway',sans-serif; font-size:1.05rem; font-weight:900; color:var(--brand);">TASTY FOODS</span>
    </div>
  </li>

  <li><a href="index.html" data-key="nav_home" class="active">Home</a></li>
  <li><a href="menu.html" data-key="nav_menu">Menu</a></li>
  <li><a href="about.html" data-key="nav_about">About Us</a></li>
  <li><a href="contact.html" data-key="nav_contact">Contact</a></li>
  <li class="order-link">
    <a href="order.html" data-key="nav_order">
      Order
      <span class="nav-badge" id="nav-cart-badge" style="display:none">0</span>
    </a>
  </li>

  <!-- Lang switch inside mobile menu -->
  <li class="mobile-lang" style="margin-top:auto; padding-top:16px; border-top:1px solid var(--border);">
    <div style="display:flex; align-items:center; gap:10px; padding:13px 16px;">
      <img src="https://flagcdn.com/w20/mn.png" id="mobile-lang-flag" style="width:20px; height:14px; border-radius:2px;">
      <div class="switch-track" id="mobile-lang-track" onclick="Lang.toggle(); document.getElementById('mobile-lang-flag').src = Lang.getLang()==='en' ? 'https://flagcdn.com/w20/gb.png' : 'https://flagcdn.com/w20/mn.png'">
        <div class="switch-handle"></div>
      </div>
      <span id="mobile-lang-label" style="font-weight:700; font-size:0.85rem; color:var(--mid)">MN</span>
    </div>
  </li>

</ul>

    <!-- Lang switch — right -->
    <div class="lang-switch">
      <img src="https://flagcdn.com/w20/mn.png" id="lang-flag" alt="Language flag">
      <div class="switch-track" id="lang-track" onclick="Lang.toggle()">
        <div class="switch-handle"></div>
      </div>
      <span id="lang-label">MN</span>
    </div>

  </div>
</nav>

<!-- Mobile overlay — outside nav -->
<div class="mobile-overlay" id="mobile-overlay" onclick="closeMobileMenu()"></div>

<div class="menu-hero">
  <span class="section-tag" style="color:rgba(255,107,69,0.7)">Tasty Foods</span>
  <h1 data-key="menu_title">Our Full Menu</h1>
  <p>Fresh ingredients. Bold flavors. Every day.</p>
</div>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" onclick="filterMenu('all', this)" data-key="filter_all">All</button>
  <button class="filter-btn" onclick="filterMenu('Spicy', this)">Spicy 🌶</button>
  <button class="filter-btn" onclick="filterMenu('Korean', this)">Korean</button>
  <button class="filter-btn" onclick="filterMenu('Meat', this)">Meat</button>
  <button class="filter-btn" onclick="filterMenu('Soup', this)">Soup</button>
  <button class="filter-btn" onclick="filterMenu('Chicken', this)">Chicken</button>
</div>

<div class="menu-grid-wrap">
  <div class="food-grid" id="food-grid"></div>
  <div class="pag-wrap" id="pag-wrap"></div>
</div>

<aside id="cart-sidebar" class="cart-sidebar">
  <div class="cart-header">
    <h3 data-key="cart_title">Your Order</h3>
    <button class="cart-close" onclick="Cart.close()">✕</button>
  </div>
  <div id="cart-items" class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span data-key="cart_total">Total:</span>
      <span id="cart-total">0₮</span>
    </div>
    <a href="order.html" class="btn btn-primary btn-full" data-key="cart_checkout">Order Now 🚀</a>
  </div>
</aside>
<div id="cart-overlay" class="cart-overlay"></div>

<button class="float-cart" onclick="Cart.toggle()">
  <span class="float-badge" id="cart-badge">0</span>
  <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" alt="Cart">
</button>

<div id="toast" class="toast"></div>

<script src="js/lang.js"></script>
<script src="js/cart.js"></script>
<script src="js/menu-page.js"></script>
</body>
</html>
